<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>비밀번호 변경</title>
</head>
<body>
    <h2>비밀번호 변경</h2>

    <p>
        <a href="/main">재고현황으로 돌아가기</a>
    </p>

    {% if message %}
    <p style="color:blue;">{{ message }}</p>
    {% endif %}

    {% if error %}
    <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="post">
        기존 비밀번호: <input name="old_password" type="password" required><br><br>
        새 비밀번호: <input name="new_password" type="password" required><br><br>
        <button>변경</button>
    </form>
</body>
</html>
