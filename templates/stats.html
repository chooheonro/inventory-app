<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>통계</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 15px; }
        .card { border: 1px solid #ddd; padding: 12px; margin: 8px; display: inline-block; min-width: 160px; border-radius: 8px; }
        table { border-collapse: collapse; width: 100%; margin-top: 15px; }
        th, td { border: 1px solid #ccc; padding: 7px; text-align: center; }
        th { background: #f2f2f2; }
    </style>
</head>
<body>
    <h2>재고 통계</h2>
    <p><a href="/main">재고현황으로 돌아가기</a></p>

    <div class="card">
        <h3>품목 수</h3>
        <p>{{ total_items }}개</p>
    </div>

    <div class="card">
        <h3>총 재고 수량</h3>
        <p>{{ total_stock }}개</p>
    </div>

    <div class="card">
        <h3>총 재고 금액</h3>
        <p>{{ "{:,}".format(total_value) }}원</p>
    </div>

    <div class="card">
        <h3>부족재고</h3>
        <p>{{ low_count }}개</p>
    </div>

    <h3>출고 많은 품목 TOP 10</h3>

    <table>
        <tr>
            <th>순위</th>
            <th>품목명</th>
            <th>총 출고수량</th>
        </tr>

        {% for item in top_out %}
        <tr>
            <td>{{ loop.index }}</td>
            <td>{{ item[0] }}</td>
            <td>{{ item[1] }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
